<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Access - Study Sight</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%230A0A0B'/><ellipse cx='16' cy='16' rx='12' ry='8' fill='white'/><circle cx='16' cy='16' r='5' fill='%23111'/><circle cx='14' cy='14' r='1.5' fill='white'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0B;
    --bg2: #111114;
    --bg3: #18181C;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #F0EEE8;
    --muted: #888884;
    --accent: #3B82F6;
    --green: #10B981;
    --red: #EF4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,11,0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.02em;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 56px 48px;
    width: 100%;
    max-width: 440px;
    text-align: center;
  }

  .eyes {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .eye {
    width: 44px;
    height: 44px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .pupil {
    width: 14px;
    height: 14px;
    background: #111;
    border-radius: 50%;
    position: absolute;
    transition: transform 0.12s ease-out;
  }

  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: -0.025em;
    margin-bottom: 12px;
    line-height: 1.1;
  }

  p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.65;
    margin-bottom: 36px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 14px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
    transition: border-color 0.15s;
  }

  input[type="text"]::placeholder { color: var(--muted); letter-spacing: 0; }
  input[type="text"]:focus { border-color: rgba(255,255,255,0.3); }
  input[type="text"].error { border-color: var(--red); }

  .error-msg {
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
    display: none;
  }

  button {
    width: 100%;
    background: var(--text);
    color: #0A0A0B;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 14px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  button:hover { opacity: 0.85; }

  .download-section {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .success-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--green);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .pulse {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--text);
    color: #0A0A0B;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 32px;
    border-radius: 100px;
    text-decoration: none;
    transition: opacity 0.15s;
    width: 100%;
    justify-content: center;
  }

  .download-btn:hover { opacity: 0.85; }

  .platform-note {
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Study Sight</a>
</nav>

<div class="card">
  <div class="eyes">
    <div class="eye" id="eye-left"><div class="pupil" id="pupil-left"></div></div>
    <div class="eye" id="eye-right"><div class="pupil" id="pupil-right"></div></div>
  </div>

  <div id="code-section">
    <h1>Early access</h1>
    <p>Enter your access code to download Study Sight.</p>

    <div class="input-wrap">
      <input type="text" id="code-input" placeholder="Enter code" autocomplete="off" spellcheck="false">
    </div>
    <p class="error-msg" id="error-msg">That code isn't right. Try again.</p>
    <button onclick="checkCode()">Unlock</button>
  </div>

  <div class="download-section" id="download-section">
    <div class="success-badge"><div class="pulse"></div>Access granted</div>
    <h1>You're in.</h1>
    <p>Download Study Sight and install it on your Mac.</p>
    <a href="https://github.com/zbobbrown/studysight/releases/download/v0.1.0/StudySight_0.1.0_aarch64.dmg" class="download-btn" id="download-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download for Mac
    </a>
    <span class="platform-note">macOS 12+ · Apple Silicon & Intel</span>
  </div>
</div>

<script>
  function trackEye(eye, pupil, mx, my) {
    const rect = eye.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = mx - cx;
    const dy = my - cy;
    const angle = Math.atan2(dy, dx);
    const dist = Math.min(Math.hypot(dx, dy), 12);
    pupil.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
  }

  document.addEventListener('mousemove', (e) => {
    trackEye(document.getElementById('eye-left'), document.getElementById('pupil-left'), e.clientX, e.clientY);
    trackEye(document.getElementById('eye-right'), document.getElementById('pupil-right'), e.clientX, e.clientY);
  });

  document.getElementById('code-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkCode();
  });

  function checkCode() {
    const input = document.getElementById('code-input');
    const error = document.getElementById('error-msg');
    if (input.value.trim().toLowerCase() === 'sight') {
      document.getElementById('code-section').style.display = 'none';
      const dl = document.getElementById('download-section');
      dl.style.display = 'flex';
    } else {
      input.classList.add('error');
      error.style.display = 'block';
      input.value = '';
      setTimeout(() => input.classList.remove('error'), 1000);
    }
  }
</script>

</body>
</html>
